<!DOCTYPE html>
<html>
<head>
    <title>Timeline Debug</title>
    <style>
        body { margin: 0; padding: 20px; background: #0a0b0f; color: white; }
        .debug { background: #1a1b23; padding: 20px; margin: 10px 0; border-radius: 8px; }
        #timeline-container {
            width: 100%;
            height: 400px;
            background: #2a2d3a;
            border: 2px solid #00d4ff;
            margin: 20px 0;
        }
    </style>
</head>
<body>
    <div class="debug">
        <h2>Timeline Debug Test</h2>
        <div id="timeline-container">Timeline should appear here...</div>
        <div id="status">Status: Loading...</div>
    </div>

    <script>
        // Minimal project data
        const projectsData = [
            {
                id: 'test1',
                stage: 'Test',
                title: 'Test Project 1',
                headline: 'Test headline',
                image: 'images/project-placeholder.svg'
            },
            {
                id: 'test2',
                stage: 'Test',
                title: 'Test Project 2',
                headline: 'Another test',
                image: 'images/project-placeholder.svg'
            }
        ];

        // Simple timeline test
        function testTimeline() {
            const container = document.getElementById('timeline-container');
            const status = document.getElementById('status');

            if (!container) {
                status.textContent = 'ERROR: Container not found!';
                return;
            }

            container.innerHTML = '<p style="color: lime; padding: 20px;">Timeline container found! Adding projects...</p>';

            projectsData.forEach((project, index) => {
                const div = document.createElement('div');
                div.style.cssText = 'background: #00d4ff; color: black; padding: 10px; margin: 5px; display: inline-block;';
                div.textContent = project.title;
                container.appendChild(div);
            });

            status.textContent = 'SUCCESS: Timeline rendered!';
        }

        document.addEventListener('DOMContentLoaded', testTimeline);
    </script>
</body>
</html>
